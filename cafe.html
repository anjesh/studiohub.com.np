<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafe | Studio Hub Consulting</title>
    <meta name="description" content="Cafe portfolio category for Studio Hub Consulting." />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./category.css" />
  </head>
  <body>
    <div class="page-shell" data-category-key="cafe">
      <header class="site-header category-header">
        <div class="brand-lockup">
          <p class="eyebrow">Studio Hub Consulting</p>
          <h1 data-category-title>Cafe</h1>
        </div>
        <nav class="header-meta category-nav" aria-label="Page navigation">
          <a href="./index.html">Home</a>
          <a href="./contact.html">Contact</a>
        </nav>
      </header>
      <nav class="category-links" aria-label="Portfolio categories">
        <a href="./residence.html">Residence</a>
        <a href="./hotel.html">Hotel</a>
        <span class="category-link-current">Cafe</span>
        <a href="./commercial.html">Commercial</a>
        <a href="./interior.html">Interior</a>
        <a href="./outsourcing.html">Outsourcing</a>
      </nav>
      <main>
        <section class="category-hero" aria-labelledby="category-hero-title">
          <div class="category-hero-copy">
            <p class="section-label" data-category-label>Cafe Portfolio</p>
            <h2 id="category-hero-title" data-category-hero-title></h2>
            <p data-category-hero-support></p>
          </div>
          <figure class="category-hero-media">
            <img data-category-hero-image src="" alt="" />
          </figure>
        </section>
        <section class="project-list" aria-labelledby="project-list-title">
          <div class="section-heading">
            <p class="section-label" id="project-list-title">Projects</p>
          </div>
          <div data-project-root></div>
        </section>
      </main>
    </div>
    <div class="lightbox" id="lightbox" hidden>
      <div class="lightbox-panel" role="dialog" aria-modal="true" aria-labelledby="lightbox-caption">
        <button class="lightbox-close" id="lightbox-close" type="button" aria-label="Close image popup">×</button>
        <figure class="lightbox-figure">
          <img id="lightbox-image" src="" alt="" />
          <figcaption class="lightbox-caption" id="lightbox-caption"></figcaption>
        </figure>
      </div>
    </div>
    <script src="./portfolio-data.js"></script>
    <script src="./gallery.js"></script>
    <script src="./category-page.js"></script>
  </body>
</html>
